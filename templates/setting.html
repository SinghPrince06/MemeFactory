{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'assets/images/favicon.png' %}" rel="icon" type="image/png">
    <title>Settings</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'assets/css/icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/uikit.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/tailwind.css' %}">

</head>

<body class="settings-page">

            <div class="container m-auto"> 

                <div class="settings-header">
                    <h1 class="settings-title">
                        <i class="icon-feather-settings"></i>
                        Account Settings
                    </h1>

                    <p class="settings-subtitle">
                        Customize your MemeFactory identity for @{{user.username}}
                    </p>
                </div>
                <hr>
                

                <div class="grid lg:grid-cols-3 mt-12 gap-8">
                    <div>
                        <h3 class="settings-section-title">
                            <i class="icon-feather-user"></i>
                            General
                        </h3>

                        <p class="settings-section-subtitle">
                            Manage your public profile and personal details
                        </p>
                        <p></p>
                    </div>
                    <div class="settings-card col-span-2">
                        <form id="settingsForm" action="" method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="grid grid-cols-2 gap-3 lg:p-6 p-4">
                                
                                    <div class="col-span-2">
                                        <label for=""> Profile Picture</label>
                                        <!-- <img width="100" height="100" src="{{user_profile.profileimg.url}}" > -->
                                        <img src="{{ user_profile.profileimg.url }}"
                                            class="profile-preview">
                                        <label class="custom-upload">
                                            <i class="icon-feather-upload"></i>
                                            Upload Image
                                            <input type="file" name="image" hidden>
                                        </label>
                                    </div>
                                    <div class="col-span-2">
                                        <label> Banner</label>
                                        <img src="{{ user_profile.banner.url }}"
                                            class="banner-preview">
                                        <label class="custom-upload">
                                            <i class="icon-feather-image"></i>
                                            Upload Banner
                                            <input type="file" name="banner" hidden>
                                        </label>
                                    </div>
                                    <div class="col-span-2">
                                        <label for="about"> Bio </label>  
                                        <textarea id="bio" name="bio" rows="3"  class="settings-input">{{user_profile.bio}}</textarea>
                                    </div> 
                                    <div class="col-span-2">
                                        <label for=""> Location</label>
                                        <input type="text" name='location' value="{{user_profile.location}}" placeholder="" class="settings-input">
                                    </div>
                                    <div>
                                    <label for=""> Relationship </label>
                                    <select id="relationship" name="relationship" class="settings-input">
                                        <option value="0" {% if user_profile.relationship == "0" %}selected{% endif %}>None</option>
                                        <option value="1" {% if user_profile.relationship == "1" %}selected{% endif %}>Single</option>
                                        <option value="2" {% if user_profile.relationship == "2" %}selected{% endif %}>Mingle</option>
                                        <option value="3" {% if user_profile.relationship == "3" %}selected{% endif %}>Married</option>
                                        <option value="4" {% if user_profile.relationship == "4" %}selected{% endif %}>Engaged</option>
                                    </select>
                                    </div>
                            </div> 
            
                            <div class="bg-gray-10 p-6 pt-0 flex justify-end space-x-3">
                                <button type="button"
                                        class="cancel-btn"
                                        id="cancelButton">
                                    Cancel
                                </button>

                                <!-- CANCEL MODAL -->

                                <div id="cancelModal" class="cancel-modal">

                                    <div class="cancel-modal-box">

                                        <h2>Discard Changes?</h2>

                                        <p>
                                            Your unsaved profile changes will be lost.
                                            Are you sure you want to leave settings?
                                        </p>

                                        <div class="cancel-modal-actions">

                                            <button type="button"
                                                class="stay-btn"
                                                onclick="closeCancelModal()">
                                                Stay Here
                                            </button>

                                            <a href="/" class="discard-btn">
                                                Yes, Leave
                                            </a>

                                        </div>

                                    </div>

                                </div>

                                <button type="submit" class="save-btn"> Save </button>
                        </form>
                    </div>
    
    
                    </div>
                    <br>

                </div>

            </div>
            
        </div>

    </div>


    

 <!-- Scripts
    ================================================== -->
    <script src="{% static 'assets/js/tippy.all.min.js' %}"></script>  
    <script src="{% static 'assets/js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'assets/js/uikit.js' %}"></script>
    <script src="{% static 'assets/js/simplebar.js' %}"></script>
    <script src="{% static 'assets/js/custom.js' %}"></script>

    <script>

        const form = document.getElementById("settingsForm");
        const cancelBtn = document.getElementById("cancelButton");
        const modal = document.getElementById("cancelModal");

        /* TRACK REAL FORM CHANGES */

        let initialFormData = new FormData(form);

        function hasFormChanged() {

            let currentFormData = new FormData(form);

            for (let pair of initialFormData.entries()) {

                const key = pair[0];
                const initialValue = pair[1];
                const currentValue = currentFormData.get(key);

                if (initialValue != currentValue) {
                    return true;
                }
            }

            return false;
        }

        /* CANCEL BUTTON */

        cancelBtn.addEventListener("click", function(e){

            e.preventDefault();

            /* NO CHANGES → GO HOME DIRECTLY */

            if(!hasFormChanged()){
                window.location.href = "/";
                return;
            }

            /* SHOW MODAL */

            modal.classList.add("active");
        });

        /* CLOSE MODAL */

        function closeCancelModal(){
            modal.classList.remove("active");
        }

        /* CLEAR MODAL STATE ON PAGE LOAD/BACK */

        window.addEventListener("pageshow", function(){
            modal.classList.remove("active");
        });

    </script>


    <script src="{% static '../../unpkg.com/ionicons%405.2.3/dist/ionicons.js' %}"></script>
</body>

</html>
