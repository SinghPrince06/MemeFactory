{% load static %}

<!DOCTYPE html>
<html lang="en">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'assets/images/favicon.png' %}" rel="icon" type="image/png">
    <title>Sign Up</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'assets/css/icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/uikit.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/tailwind.css' %}">

</head>

<body class="auth-page">

    <div class="floating-emoji" style="left:10%; animation-delay:0s;">😂</div>
    <div class="floating-emoji" style="left:30%; animation-delay:2s;">🔥</div>
    <div class="floating-emoji" style="left:50%; animation-delay:4s;">😎</div>
    <div class="floating-emoji" style="left:70%; animation-delay:1s;">🚀</div>
    <div class="floating-emoji" style="left:85%; animation-delay:3s;">💀</div>

    <div id="wrapper" class="flex flex-col justify-between h-screen">

        <!-- header-->
        <div class="auth-topbar">

            <a href="/" class="brand-logo">
                MemeFactory
            </a>

            <a href="/signin" class="register-btn">
                <i class="uil-arrow-right"></i> Login
            </a>

        </div>

        <!-- Content-->

        <div>
            <div class="auth-card signup-card mx-auto p-8 auth-container">
                <h1 class="auth-title">Create Account ✨</h1>

                <p class="auth-subtitle signup-subtitle">
                    Join the meme universe and start posting chaos
                </p>
                
                <div>
                    <style>
                        h5{
                            color: red;
                        }
                    </style>
                    {% for message in messages %}
                    <h5>{{message}}</h5>
                    {% endfor %}
                </div>

                <form action="" method="POST">
                    {% csrf_token %}
                    <!--<div class="flex lg:flex-row flex-col lg:space-x-2">
                        <input type="text" placeholder="First Name"  class="bg-gray-200 mb-2 shadow-none  dark:bg-gray-800" style="border: 1px solid #d3d5d8 !important;">
                        <input type="text" placeholder="Last Name" class="bg-gray-200 mb-2 shadow-none  dark:bg-gray-800" style="border: 1px solid #d3d5d8 !important;">
                    </div>-->
                    <div style="position: relative; width: 100%;">
                        <div class="input-wrapper">

                            <i class="uil-user input-icon"></i>

                            <input type="text"
                                name="username"
                                placeholder="Username"
                                class="auth-input auth-input-icon mb-1"
                                required>

                        </div>
                    </div>

                    <div style="position: relative; width: 100%;">
                        <div class="input-wrapper">

                            <i class="uil-envelope input-icon"></i>

                            <input type="email"
                                name="email"
                                placeholder="Email"
                                class="auth-input auth-input-icon mb-1"
                                required>

                        </div>
                    </div>
                    
                    <div style="position: relative; width: 100%;">
                        <div class="input-wrapper">

                            <i class="uil-padlock input-icon"></i>

                            <input type="password"
                                name="password"
                                placeholder="Password"
                                class="auth-input auth-input-icon mb-1"
                                required>

                            <span class="password-toggle"
                                onclick="togglePassword('password', this)">
                                <i class="uil-eye-slash"></i>
                            </span>

                        </div>
                    </div>

                    <div style="position: relative; width: 100%;">
                        <div class="input-wrapper">

                            <i class="uil-lock-alt input-icon"></i>

                            <input type="password"
                                name="password2"
                                placeholder="Confirm Password"
                                class="auth-input auth-input-icon mb-1"
                                required>

                            <span class="password-toggle"
                                onclick="togglePassword('password2', this)">
                                <i class="uil-eye-slash"></i>
                            </span>

                        </div>
                    </div>
                    <br>

                    <!-- <div class="flex justify-start my-4 space-x-1">
                        <div class="checkbox">
                            <input type="checkbox" id="chekcbox1" checked>
                            <label for="chekcbox1"><span class="checkbox-icon"></span> I Agree</label>
                        </div>
                        <a href="#"> Terms and Conditions</a>
                    </div> -->
                    <button type="submit" class="auth-btn">
                        <i class="uil-user-plus"></i> Create Account
                    </button>
                    <div class="text-center mt-5 space-x-2">
                        <p class="signup-switch-text">
                            Already have an account?
                            <a href="/signin">Login</a>
                        </p>
                    </div>
                </form>


            </div>
        </div>
        
        <!-- Footer -->
        <div class="auth-bottom-bar">

            <div class="bottom-left-links">
                <a href="#">About</a>
                <a href="#">Help</a>
            </div>

            <div class="bottom-right-copy">
                ©Copyright 2026 MemeFactory
            </div>

        </div>

    </div>

    <!-- Scripts
    ================================================== -->
    <script src="{% static 'assets/js/tippy.all.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'assets/js/uikit.js' %}"></script>
    <script src="{% static 'assets/js/simplebar.js' %}"></script>
    <script src="{% static 'assets/js/custom.js' %}"></script>

    <script>
        function togglePassword(fieldName, element) {

            const input = document.querySelector(`input[name="${fieldName}"]`);
            const icon = element.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("uil-eye-slash");
                icon.classList.add("uil-eye");
            } else {
                input.type = "password";
                icon.classList.remove("uil-eye");
                icon.classList.add("uil-eye-slash");
            }
        }
    </script>


</body>


</html>
